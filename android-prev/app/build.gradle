plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.nudge"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.nudge"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion 24
        targetSdkVersion 35
        compileSdkVersion 35
        versionCode = 1
        versionName = "1.0.0"
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    //implementation 'com.google.firebase:firebase-core:16.0.1'
    
    
    // implementation 'com.google.firebase:firebase-auth:10.2.6'
    // //firebase database
    // implementation 'com.google.firebase:firebase-database:10.2.6'
    // //firebase storage
    // implementation 'com.google.firebase:firebase-storage:10.2.6'

    implementation 'com.google.firebase:firebase-auth:23.1.0'
    //firebase database
    implementation 'com.google.firebase:firebase-database'
    //firebase storage
    implementation 'com.google.firebase:firebase-storage'


    implementation 'com.google.firebase:firebase-analytics'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:runner:1.1.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.core:core:1.13.1'
    // implementation 'com.android.support:support-v4:23.0.0'
    // implementation 'androidx.appcompat:appcompat:1.6.0'
